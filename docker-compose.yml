services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: ohhaeng-oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Orac1eX#e
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/init:/container-entrypoint-initdb.d
    shm_size: "1g"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  oracle-data:
